{% extends 'base.html' %}
{% block content %}
<h2>{% if task %}Edit Task{% else %}Add Task{% endif %}</h2>
<form method="post">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="meeting_date" class="form-label">Meeting Date</label>
            <input type="date" class="form-control" id="meeting_date" name="meeting_date" value="{{ task.meeting_date if task else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="task_description" class="form-label">Task Description</label>
            <input type="text" class="form-control" id="task_description" name="task_description" value="{{ task.task_description if task else '' }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="assigned_to" class="form-label">Assigned To</label>
            <input type="text" class="form-control" id="assigned_to" name="assigned_to" value="{{ task.assigned_to if task else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ task.email if task else '' }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="start_date" class="form-label">Start Date</label>
            <input type="date" class="form-control" id="start_date" name="start_date" value="{{ task.start_date if task else '' }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="end_date" class="form-label">End Date (Due)</label>
            <input type="date" class="form-control" id="end_date" name="end_date" value="{{ task.end_date if task else '' }}" required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="priority" class="form-label">Priority</label>
            <select class="form-select" id="priority" name="priority" required>
                <option value="High" {% if task and task.priority == 'High' %}selected{% endif %}>High</option>
                <option value="Medium" {% if task and task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Low" {% if task and task.priority == 'Low' %}selected{% endif %}>Low</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-select" id="status" name="status" required>
                <option value="Open" {% if task and task.status == 'Open' %}selected{% endif %}>Open</option>
                <option value="In Progress" {% if task and task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                <option value="Closed" {% if task and task.status == 'Closed' %}selected{% endif %}>Closed</option>
            </select>
        </div>
    </div>
    <div class="mb-3">
        <label for="remarks" class="form-label">Remarks</label>
        <textarea class="form-control" id="remarks" name="remarks" rows="2">{{ task.remarks if task else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
